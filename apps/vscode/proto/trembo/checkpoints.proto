syntax = "proto3";

package trembo;

import "trembo/common.proto";

option go_package = "github.com/trembo/grpc-go/trembo";
option java_multiple_files = true;
option java_package = "bot.trembo.proto";

service CheckpointsService {
  rpc checkpointRestore(CheckpointRestoreRequest) returns (Empty);
}

message CheckpointRestoreRequest {
  Metadata metadata = 1;
  int64 number = 2;
  string restore_type = 3;
  optional int64 offset = 4;
}
