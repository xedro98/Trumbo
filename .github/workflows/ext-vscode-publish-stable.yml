name: ext-vscode-publish-stable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      git_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string
      confirm_publish:
        description: 'Required. Type "publish" to confirm VS Code Marketplace publish.'
        required: true
        type: string
      pre_release:
        description: "Publish to the VS Code Marketplace pre-release channel"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: ext-vscode-publish-${{ github.event_name == 'push' && github.ref_name || github.event.inputs.git_tag || format('manual-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Trumbo VS Code extension
    runs-on: ubuntu-latest
    environment: vscode-marketplace-release
    if: |
      github.repository == 'xedro98/Trumbo' &&
      !endsWith(github.actor, '[bot]') &&
      (
        (
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/v') &&
          !startsWith(github.ref_name, 'cli-v')
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.confirm_publish == 'publish'
        )
      )
    env:
      TELEMETRY_SERVICE_API_KEY: ${{ secrets.TELEMETRY_SERVICE_API_KEY }}
      ERROR_SERVICE_API_KEY: ${{ secrets.ERROR_SERVICE_API_KEY }}
      OTEL_TELEMETRY_ENABLED: ${{ secrets.OTEL_TELEMETRY_ENABLED }}
      OTEL_LOGS_EXPORTER: ${{ secrets.OTEL_LOGS_EXPORTER }}
      OTEL_METRICS_EXPORTER: ${{ secrets.OTEL_METRICS_EXPORTER }}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${{ secrets.OTEL_EXPORTER_OTLP_PROTOCOL }}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      TRUMBO_ENVIRONMENT: production
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release tag
        id: version
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_tag || github.ref_name }}
        run: |
          if [ -z "$TAG" ]; then
            echo "Release tag is required"
            exit 1
          fi

          if ! printf "%s\n" "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Release tag must look like vX.Y.Z, got: ${TAG}"
            exit 1
          fi

          if printf "%s\n" "$TAG" | grep -Eq '^cli-v'; then
            echo "Use cli-v* tags for CLI releases, not the VS Code extension workflow"
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./projects/vscode/package.json').version")

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "projects/vscode/package.json version ${PACKAGE_VERSION} does not match ${TAG}"
            exit 1
          fi

          TAG_COMMIT=$(git rev-parse "${TAG}^{commit}")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "${TAG} does not point at the checked out commit"
            exit 1
          fi

          git fetch origin +main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$HEAD_COMMIT" origin/main; then
            echo "${TAG} is not reachable from origin/main"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build SDK packages
        run: bun run build:sdk

      - name: Package VSIX
        working-directory: projects/vscode
        run: bun run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: trumbo-vscode-${{ steps.version.outputs.version }}
          path: projects/vscode/trumbo-*.vsix
          if-no-files-found: error

      - name: Resolve Marketplace auth mode
        id: auth
        run: |
          if [ -n "${AZURE_CLIENT_ID}" ] && [ -n "${AZURE_TENANT_ID}" ]; then
            echo "mode=azure-credential" >> "$GITHUB_OUTPUT"
            echo "Using Entra ID (GitHub OIDC) for VS Code Marketplace publish"
          elif [ -n "${VSCE_PAT}" ]; then
            echo "mode=pat" >> "$GITHUB_OUTPUT"
            echo "Using VSCE_PAT for VS Code Marketplace publish (legacy; migrate to OIDC before 2026-12-01)"
          else
            echo "Set repository vars AZURE_CLIENT_ID + AZURE_TENANT_ID (recommended) or secret VSCE_PAT."
            echo "See projects/vscode/docs/MARKETPLACE_PUBLISH.md"
            exit 1
          fi

      - name: Azure login (OIDC) for Marketplace publishing
        if: steps.auth.outputs.mode == 'azure-credential'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        working-directory: projects/vscode
        env:
          TRUMBO_VSCE_AUTH: ${{ steps.auth.outputs.mode == 'azure-credential' && 'azure-credential' || 'pat' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.pre_release }}" = "true" ]; then
            node scripts/publish-marketplace.mjs --pre-release
          else
            node scripts/publish-marketplace.mjs
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Trumbo VS Code v${{ steps.version.outputs.version }}"
          files: projects/vscode/trumbo-*.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Published trumbo.trumbo@${VERSION} to the VS Code Marketplace"
          echo "Marketplace: https://marketplace.visualstudio.com/items?itemName=trumbo.trumbo"
