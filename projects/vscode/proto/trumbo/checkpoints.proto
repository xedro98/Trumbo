syntax = "proto3";

package trumbo;

import "trumbo/common.proto";

option go_package = "github.com/trumbo/grpc-go/trumbo";
option java_multiple_files = true;
option java_package = "bot.trumbo.proto";

service CheckpointsService {
  rpc checkpointRestore(CheckpointRestoreRequest) returns (Empty);
}

message CheckpointRestoreRequest {
  Metadata metadata = 1;
  int64 number = 2;
  string restore_type = 3;
  optional int64 offset = 4;
}
