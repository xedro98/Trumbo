<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light dark" />
		<script>
			(function () {
				try {
					var key = "trumbo-marketing-theme";
					var stored = localStorage.getItem(key);
					var theme =
						stored === "light" || stored === "dark" || stored === "system"
							? stored
							: "system";
					var resolved =
						theme === "system"
							? window.matchMedia("(prefers-color-scheme: dark)").matches
								? "dark"
								: "light"
							: theme;
					document.documentElement.classList.add(
						resolved === "dark" ? "marketing-dark" : "marketing-light",
					);
					document.documentElement.style.colorScheme = resolved;
				} catch (e) {
					document.documentElement.classList.add("marketing-light");
				}
			})();
		</script>
		<meta
			name="description"
			content="Trumbo is where builders run agents in the terminal. Open models, real tools, and a platform built for your whole team."
		/>
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://trumbo.dev/" />

			property="og:description"
			content="Trumbo is where builders run agents in the terminal. Open models, real tools, and a platform built for your whole team."
